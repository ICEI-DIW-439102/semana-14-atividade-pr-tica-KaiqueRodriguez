<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GameRoom - Cadastro de Jogos</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
        }
        .card-dark {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
        }
        .form-control, .form-select {
            background-color: #0d1117;
            border-color: #30363d;
            color: #e6edf3;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            border-color: #f5c518;
            color: #e6edf3;
            box-shadow: 0 0 0 0.2rem rgba(245, 197, 24, 0.25);
        }
        .form-control::placeholder {
            color: #8b949e;
        }
        .btn-gold {
            background-color: #f5c518;
            color: #0d1117;
            font-weight: bold;
        }
        .btn-gold:hover {
            background-color: #d4aa14;
            color: #0d1117;
        }
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: #e6edf3;
            --bs-table-border-color: #30363d;
        }
        #mensagem {
            display: none;
        }
    </style>
</head>
<body>
    <main class="container py-4">
        <header class="text-center mb-4">
            <h1>🎮 Cadastro de Jogos</h1>
            <p class="text-secondary">Gerencie os jogos do My GameRoom (CRUD com JSON Server)</p>
            <a href="index.html" class="btn btn-outline-light btn-sm">⬅ Catálogo</a>
            <a href="graficos.html" class="btn btn-outline-light btn-sm">📊 Estatísticas</a>
        </header>

        <div id="mensagem" class="alert text-center"></div>

      
        <section class="card-dark mb-4">
            <h2 class="fs-5 mb-3" id="tituloForm">Novo jogo</h2>

            <input type="hidden" id="jogoId">

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="nome" class="form-label">Nome *</label>
                    <input type="text" class="form-control" id="nome" placeholder="Ex.: Elden Ring">
                </div>
                <div class="col-md-6">
                    <label for="genero" class="form-label">Gênero *</label>
                    <input type="text" class="form-control" id="genero" placeholder="Ex.: RPG / Ação">
                </div>
                <div class="col-md-3">
                    <label for="horas" class="form-label">Horas jogadas</label>
                    <input type="text" class="form-control" id="horas" placeholder="Ex.: 30H">
                </div>
                <div class="col-md-3">
                    <label for="conquistas" class="form-label">Conquistas</label>
                    <input type="text" class="form-control" id="conquistas" placeholder="Ex.: 10/42">
                </div>
                <div class="col-md-3">
                    <label for="imagem" class="form-label">Imagem principal</label>
                    <input type="text" class="form-control" id="imagem" placeholder="assets/img/arquivo.png">
                </div>
                <div class="col-md-3">
                    <label for="destaque" class="form-label">Destaque?</label>
                    <select class="form-select" id="destaque">
                        <option value="false">Não</option>
                        <option value="true">Sim</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="descricao" class="form-label">Descrição curta</label>
                    <input type="text" class="form-control" id="descricao" placeholder="Uma frase sobre o jogo">
                </div>
                <div class="col-12">
                    <label for="conteudo" class="form-label">Conteúdo (texto da página de detalhes)</label>
                    <textarea class="form-control" id="conteudo" rows="2"></textarea>
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <button id="btnSalvar" class="btn btn-gold">Salvar jogo</button>
                <button id="btnCancelar" class="btn btn-outline-light" style="display: none;">Cancelar edição</button>
            </div>
        </section>

        <
        <section class="card-dark">
            <h2 class="fs-5 mb-3">Jogos cadastrados</h2>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Gênero</th>
                            <th>Horas</th>
                            <th>Conquistas</th>
                            <th class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaJogos"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="assets/js/cadastro.js"></script>
</body>
</html>
