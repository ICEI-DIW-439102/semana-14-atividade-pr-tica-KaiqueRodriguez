<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GameRoom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <header class="topo">
    <img src="assets/img/Logo_png.png" alt="My GameRoom" class="logo">

    <section class="login">
      <h3>Login</h3>
      <div class="login-campos">
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button type="button">Entrar</button>
      </div>
    </section>

    <nav class="menu">
      <ul>
        <li>INICIO</li>
        <li>BIBLIOTECA</li>
        <li>COMUNIDADE</li>
        <li>PERFIL</li>
        <li>CONFIGURAÇÕES</li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="banner">
      <img src="assets/img/banner.png" alt="Banner My GameRoom">
    </section>

    <div class="container">
      <h2 class="boas-vindas">BEM-VINDO, USER!</h2>
      <p class="intro">Seu espaço gamer: acompanhe sua biblioteca, conquistas e os jogos que você mais ama.</p>

      <h3 class="titulo-secao">Meus Jogos</h3>
      <div class="lista-cards" id="lista-jogos"></div>
    </div>
  </main>

  <footer class="rodape">
    <p>PROJETO EM DESENVOLVIMENTO</p>
    <p>ALUNO: KAIQUE RODRIGUES</p>
    <p>NOME DO PROJETO: MY GAMEROOM</p>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
