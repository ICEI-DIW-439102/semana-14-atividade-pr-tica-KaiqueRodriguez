<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GameRoom - Estatísticas</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
        }
        .chart-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            height: 100%;
        }
        .chart-card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .chart-container {
            position: relative;
            height: 340px;
        }
        #mensagem {
            display: none;
        }
    </style>
</head>
<body>
    <main class="container py-4">
        <header class="text-center mb-4">
            <h1>📊 Estatísticas do My GameRoom</h1>
            <p class="text-secondary">Visualização dinâmica dos jogos cadastrados via JSON Server + Chart.js</p>
            <a href="index.html" class="btn btn-outline-light btn-sm">⬅ Voltar para o catálogo</a>
        </header>

        <div id="mensagem" class="alert alert-warning text-center"></div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="chart-card">
                    <h2>Distribuição de jogos por gênero</h2>
                    <div class="chart-container">
                        <canvas id="graficoGeneros"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h2>Horas jogadas por jogo</h2>
                    <div class="chart-container">
                        <canvas id="graficoHoras"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="assets/js/graficos.js"></script>
</body>
</html>
